name: CI-CD Deploy College ERP

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./college-erp-docker/app
          file: ./college-erp-docker/app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/college-erp:latest

      - name: Deploy to AWS EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          script: |
            set -e
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/college-erp:latest
            sudo docker stop erp-web || true
            sudo docker rm erp-web || true
            sudo docker run -d -p 8081:80 --name erp-web \
              ${{ secrets.DOCKERHUB_USERNAME }}/college-erp:latest
